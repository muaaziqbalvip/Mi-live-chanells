name: Unzip Registry Files to Main

# Yeh workflow tab chalega jab aap 'registry' folder mein zip file push karenge
# Ya phir aap ise manually bhi chala sakte hain
on:
  push:
    paths:
      - 'registry/**.zip'
  workflow_dispatch:

jobs:
  extract_and_push:
    runs-on: ubuntu-latest
    
    # Permissions lazmi hain taake workflow changes push kar sake
    permissions:
      contents: write

    steps:
      # 1. Repository ka code checkout karna
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. Git user configure karna (taake commit ho sake)
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. Zip files ko dhundna aur unhe extract karna
      - name: Parse and Unzip Files
        run: |
          # Registry folder check karna
          if [ -d "registry" ]; then
            cd registry
            for file in *.zip; do
              if [ -f "$file" ]; then
                echo "Extracting $file..."
                # -o ka matlab hai overwrite agar file pehle se maujood ho
                # -d .. ka matlab hai ke files ko parent directory (main root) mein extract karo
                unzip -o "$file" -d ..
                
                # Extract karne ke baad zip file ko delete karna (optional)
                # rm "$file"
              fi
            done
            cd ..
          else
            echo "Registry folder nahi mila!"
            exit 1
          fi

      # 4. Changes ko commit aur push karna
      - name: Commit and Push Changes
        run: |
          git add .
          # Check karna ke kya koi tabdeeli hui hai
          if git diff --staged --quiet; then
            echo "Koi nayi files nahi mili commit karne ke liye."
          else
            git commit -m "Auto-extracted files from registry zip"
            git push origin main
          fi
